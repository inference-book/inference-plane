# Reference deployment config for the v0.1 docker-compose stack.
#
# Most values can be left as-is; the env-var overrides defined in
# .env.local (see .env.local.example) are the right place to tweak
# per-instance details like the provider/gpu_type labels.

server:
  addr: ":8080"
  read_timeout_sec: 60
  write_timeout_sec: 600          # long enough for slow generations
  shutdown_sec: 30                # graceful drain budget

backend:
  # 'mock' is the default so 'make up' works on any host (Mac / no-GPU).
  # For real inference, switch to 'vllm' and bring the stack up with
  # `docker compose --profile gpu up -d` so the vllm service starts.
  engine: "mock"
  url: ""                          # ignored by mock; set for vllm
  name: "mock"                     # label value for metrics/logs

telemetry:
  otlp_endpoint: "otel-collector:4317"
  service_name: "inference-plane"
  environment: "dev"
  sample_ratio: 1.0               # sample 100% in dev; lower in prod

deployment:
  # These default values describe the lab GPU instance. Override per
  # instance via CP_PROVIDER / CP_GPU_TYPE / CP_BILLING_MODE / CP_INSTANCE_ID
  # so cost metrics carry the right labels for each deployment.
  provider: "runpod"
  gpu_type: "a10g"
  billing_mode: "metered_per_second"
  instance_id: ""                 # set per-instance via env override

router:
  # v0.2 Beat 2 M/M/k waiting room in front of the engine.
  #
  # servicers = 0 keeps Beat 1's behavior: no queue, no concurrency
  # cap, requests forward inline. Demo 04 (Beat 1 closer) runs on
  # this path; the v0.2 release/v0.2 snapshot defaults stay here
  # until demo 05 (Beat 2 closer) ships and the chapter flips the
  # default in prose.
  #
  # When servicers > 0:
  #   - servicers parallel dispatcher goroutines drain the queue
  #   - capacity bounds the waiting room (M/M/k/N in Kendall notation)
  #   - arrivals beyond capacity get 503 + Retry-After (fail-fast
  #     backpressure)
  queue:
    servicers: 0
    capacity: 256
