# Reference deployment config for the v0.1 docker-compose stack.
#
# Most values can be left as-is; the env-var overrides defined in
# .env.local (see .env.local.example) are the right place to tweak
# per-instance details like the provider/gpu_type labels.

server:
  addr: ":8080"
  read_timeout_sec: 60
  write_timeout_sec: 600          # long enough for slow generations
  shutdown_sec: 30                # graceful drain budget

backend:
  # 'mock' is the default so 'make up' works on any host (Mac / no-GPU).
  # For real inference, switch to 'vllm' and bring the stack up with
  # `docker compose --profile gpu up -d` so the vllm service starts.
  engine: "mock"
  url: ""                          # ignored by mock; set for vllm
  name: "mock"                     # label value for metrics/logs

telemetry:
  otlp_endpoint: "otel-collector:4317"
  service_name: "inference-plane"
  environment: "dev"
  sample_ratio: 1.0               # sample 100% in dev; lower in prod

deployment:
  # These default values describe the lab GPU instance. Override per
  # instance via CP_PROVIDER / CP_GPU_TYPE / CP_BILLING_MODE / CP_INSTANCE_ID
  # so cost metrics carry the right labels for each deployment.
  provider: "runpod"
  gpu_type: "a10g"
  billing_mode: "metered_per_second"
  instance_id: ""                 # set per-instance via env override

router:
  # v0.2 Beat 2.4 scheduler in front of the engine. Strict-priority
  # dispatch: interactive lane preferred; batch only runs when
  # interactive is empty. Per-deployment in-flight cap mirrors the
  # engine's max-num-seqs.
  #
  # Three patterns:
  #
  # 1. Disabled (Beat 1 path): servicers = 0. Requests forward inline;
  #    no queue, no concurrency cap.
  # 2. Single global queue: set top-level servicers + capacity; both
  #    lanes inherit the same capacity.
  # 3. Per-lane tuning: set interactive.capacity / batch.capacity
  #    independently. Servicers is shared across lanes (the scheduler
  #    is one pool of workers servicing both queues).
  #
  # in_flight_cap > 0 caps concurrent in-flight per deployment; 0
  # means unlimited (only the worker count bounds engine load).
  queue:
    servicers: 0
    capacity: 256
    in_flight_cap: 0
    interactive:
      servicers: 0
      capacity: 256
    batch:
      servicers: 0
      capacity: 256
    # Per-tenant fair-share weights (v0.2 ch7-beat2.5). Within a
    # priority lane, each tenant has its own bounded sub-queue;
    # the scheduler picks one tenant per dispatch via weighted
    # random selection across non-empty tenants.
    #
    # Tenants not listed get weight 1. Higher weight = larger share
    # of dispatches under saturation. Restart-only in v0.2;
    # changes require an `iplane serve` restart.
    #
    # Example:
    #   tenant_weights:
    #     alice: 1
    #     bob: 3
    tenant_weights: {}

health:
  # v0.2 Beat 3.5 (#87): per-replica health-poll loop. One goroutine in
  # iplane serve probes GET <engine_endpoint>/health on each tick. After
  # `failure_threshold` consecutive failures, the replica is added to the
  # deployment's unhealthy_instance_ids set and the router (#85) skips
  # it. After `success_threshold` consecutive passes on a quarantined
  # replica, it is restored.
  #
  # Defaults give ~30s to first quarantine on a hung replica
  # (3 * 10s = 30s), matching the acceptance criterion in #87.
  # probe_timeout caps each probe; max_concurrent bounds in-flight probes
  # inside a tick so a daemon with many deployments doesn't fan out
  # uncontrolled.
  poll_interval: 10s
  failure_threshold: 3
  success_threshold: 3
  probe_timeout: 2s
  max_concurrent: 32
