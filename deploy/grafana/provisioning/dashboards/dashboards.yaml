# Dashboard provisioning config. Grafana scans the path below at
# startup (and every updateIntervalSeconds thereafter) and loads any
# *.json files as dashboards. This folder holds the serving dashboards
# (inference-plane-v01 / -v02) and the deployment & lifecycle dashboard
# (inference-plane-deployment) covering the provision/teardown path.

apiVersion: 1

providers:
  - name: 'inference-plane'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
