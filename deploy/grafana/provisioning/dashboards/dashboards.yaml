# Dashboard provisioning config. Grafana scans the path below at
# startup (and every updateIntervalSeconds thereafter) and loads any
# *.json files as dashboards. The Inference Plane v0.1 dashboard
# lives in this folder alongside this config.

apiVersion: 1

providers:
  - name: 'inference-plane'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
