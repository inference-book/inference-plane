# Auto-provision Tempo / Loki / Mimir as Grafana datasources so the
# user can open Grafana and see all three signals immediately.
# Mimir is the default datasource for ad-hoc PromQL panels.

apiVersion: 1

datasources:
  - name: Mimir
    type: prometheus
    uid: mimir
    url: http://mimir:9009/prometheus
    access: proxy
    isDefault: true
    jsonData:
      timeInterval: 15s
      manageAlerts: false

  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    access: proxy
    jsonData:
      derivedFields:
        # If a log line has a trace_id field, surface it as a clickable
        # link that jumps to the matching Tempo trace.
        - datasourceUid: tempo
          matcherRegex: '"trace_id":"(\w+)"'
          name: trace_id
          url: '$${__value.raw}'

  - name: Tempo
    type: tempo
    uid: tempo
    url: http://tempo:3200
    access: proxy
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: -1m
        spanEndTimeShift: 1m
        tags: [{ key: service.name, value: service }]
        filterByTraceID: true
      tracesToMetrics:
        datasourceUid: mimir
        tags: [{ key: service.name, value: service }]
