# Canonical vocabulary for OTel metrics, attributes, and labels.
#
# This file is the single source of truth for any name that appears in
# Go code, chapter prose, dashboards, alert rules, or PromQL queries.
# Drift between code and prose is silently corrosive (the chapter says
# X, the metric is named Y, the dashboard returns nothing) -- code-gen
# from one source eliminates the failure mode by construction.
#
# Run `make gen-names` (or `go generate ./...`) to regenerate:
#   - inference_plane/internal/telemetry/names.go      (Go constants)
#   - book/src/styles/metric-names.tex                  (LaTeX commands)
#
# Naming conventions:
#   - Metric instruments use dotted OTel hierarchy: inference.requests.total
#   - Attribute keys use dotted hierarchy: inference.model, deployment.provider
#   - Labels are flat lowercase: model, status, provider
#
# To add a new entry: pick the right category, give it a snake_case
# `key` (drives the Go const and tex command names), and the runtime
# `value` (the actual string emitted to OTel and read by dashboards).

metrics:
  - key: requests_total
    value: inference.requests.total
    description: Counter of inference requests, labeled by model and status.

  - key: request_duration
    value: inference.request.duration
    description: Histogram of request duration in seconds. Bucket edges tuned for the bimodal LLM latency distribution (Chapter 6.6.4).

  - key: tokens_generated
    value: inference.tokens.generated
    description: Counter of tokens generated. The right load metric for LLM workloads -- correlates with cost in a way request count never can.

  - key: backend_healthy
    value: inference.backend.healthy
    description: Gauge -- 1 if backend is healthy, 0 otherwise. Feeds alerts.

  - key: instance_uptime_seconds
    value: instance.uptime.seconds.total
    description: Counter of wall-clock seconds since the control plane started. Base for billed-time cost calculations.

  - key: inference_active_seconds
    value: inference.active.seconds.total
    description: Counter of seconds spent actively serving inference. Combined with instance.uptime gives utilization.

  - key: gpu_effective_rate
    value: gpu.effective_rate.usd_per_second
    description: Gauge of per-second cost rate for each provider/gpu_type/billing_mode combination loaded from providers.yaml. One series per provider for the cross-provider cost-projection panel.

  - key: reaper_destroys_total
    value: iplane.reaper.destroys.total
    description: Counter of deployments destroyed by the idle-TTL reaper, labeled by reason (idle, etc.). Operator-facing signal of leak protection working.

  - key: queue_depth
    value: iplane.queue.depth
    description: Gauge of current items waiting in the router's per-(deploy, tenant, lane) sub-queue. Updated synchronously on push/pop. Operator-facing signal for fair-share visibility (v0.2 ch7-beat2.6).

  - key: queue_wait_seconds
    value: iplane.queue.wait.seconds
    description: Histogram of seconds an entry spent waiting in the router's queue before dispatch. Labeled by deploy_id / tenant_id / class so per-class p95 wait is the chapter's fair-queueing dashboard story.

  - key: replica_in_flight
    value: iplane.replica.in_flight
    description: Synchronous gauge of current in-flight requests per (deploy_id, replica_id). Emitted on dispatch + on response so the value tracks live load. Demo 06's "watch replicas equalize under round-robin" panel reads this (v0.2 ch7-beat3.6, #88).

  - key: router_decisions_total
    value: iplane.router.decisions.total
    description: Counter of routing decisions, labeled by deploy_id / replica_id / outcome. Outcomes -- "picked" when a replica was selected, "no_replicas" when all were empty/quarantined (the 503 replica_unavailable path). Complementary to inference.requests.total which counts completed requests with downstream status (v0.2 ch7-beat3.6, #88).

  - key: deployment_provision_duration
    value: iplane.deployment.provision.duration
    description: Histogram of end-to-end deployment provision wall-clock seconds (create-pod through engine serving), labeled by provider / result / class. The "why is my deploy slow" top-line for the deployment dashboard.

  - key: deployment_phase_duration
    value: iplane.deployment.phase.duration
    description: Histogram of seconds spent in each deployment lifecycle phase (scheduling, image-pull, engine-init, ...), labeled by phase / provider / result. Splits the opaque cold-start into attributable stages so model-download and image-pull time are separable.

  - key: deployment_provisions_total
    value: iplane.deployment.provisions.total
    description: Counter of deployment provision attempts, labeled by provider / result (running, failed, timeout). Denominator for the provision success-rate panel.

  - key: deployment_teardown_duration
    value: iplane.deployment.teardown.duration
    description: Histogram of deployment teardown wall-clock seconds (destroy through terminated), labeled by provider / result. The spin-down half of the lifecycle dashboard; pairs with iplane.reaper.destroys.total.

