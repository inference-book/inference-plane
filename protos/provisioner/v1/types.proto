syntax = "proto3";

package provisioner.v1;

import "google/protobuf/timestamp.proto";

// Spec is what the operator asks for. Provider-agnostic. Everything in
// the spec is decided before any provider call happens.
//
// Locked by docs/design/0001-provisioner.md. Read that for the rationale
// behind every field -- especially id (mandatory and tenant-globally
// unique) and requirements (constraints-first, with class as shorthand
// and sku as escape hatch).
message Spec {
  // Operator-supplied identifier. Required. Tenant-globally unique
  // across all providers. The service rejects ids starting with the
  // reserved "iplane-" prefix.
  string id = 1;

  // Adapter that will fulfil the spec ("runpod", "local").
  string provider = 2;

  // Provider-specific region identifier. Required.
  string region = 3;

  // What the operator needs to run their workload. Numeric constraints
  // are the canonical axis; class is shorthand; sku is the escape hatch.
  ResourceRequirements requirements = 4;

  // Docker-capable base image ref the provider should boot. Phase 2's
  // deploy primitive docker-runs the engine container on top. Empty
  // means "provider default."
  string base_image = 5;

  // Operator-supplied labels (cost attribution, owner, cluster
  // membership). The adapter merges them with the iplane-id and
  // iplane-operator tags it stamps automatically.
  map<string, string> tags = 6;
}

// ResourceRequirements is what the operator needs to run their workload.
// Three layers, from most-honest to most-convenient:
//
//   1. Numeric constraints (min_vram_gb, min_disk_gb, min_ram_gb) -- the
//      canonical axis. What actually matters when deploying a model
//      (does {weights + KV cache + activations + overhead} fit in VRAM?).
//      Provider-agnostic by construction.
//
//   2. Class shorthand (class = "small" | "medium" | "large" | "xlarge")
//      -- syntactic sugar that the service expands into typical
//      constraint defaults at validation time. Operators who do not
//      want to spell out every constraint use this; the chapter's
//      act-3 demo uses this. Explicit constraints alongside class
//      refine the defaults (class sets floors, constraints can raise).
//
//   3. SKU override (sku) -- the escape hatch when constraints and
//      class do not capture what the operator needs (specific NVLink
//      topology, particular generation, exact provider SKU). Skips
//      the resolver entirely; passed straight to the provider.
//
// Per-provider SKU resolvers (b in the (a) constraints / (b) resolver /
// (c) executor model) consume the constraints and emit an ordered list
// of matching SKU identifiers, cheapest first, for the provider's
// scheduler.
message ResourceRequirements {
  // Constraints below describe ONE instance (one provider machine).
  // gpu_count > 1 means N GPUs co-located on that single machine,
  // used together (typical for tensor / pipeline parallelism). Fleets
  // of N machines each with M GPUs are not expressed here -- they
  // come from a higher layer composing N Spawn calls (v0.3's
  // ClusterManager, see docs/design/0001-provisioner.md
  // "Per-instance, not per-cluster").
  //
  // The "scope" of each constraint matches how the underlying resource
  // physically exists on the machine:
  //
  //   - VRAM is PER-GPU (each card has dedicated memory).
  //   - System RAM is PER-INSTANCE (one DDR pool, shared by CPU + GPUs).
  //   - Disk is PER-INSTANCE (one volume).
  //
  // So min_vram_gb=80, gpu_count=2 means "2 GPUs each with at least
  // 80 GB VRAM" (160 GB VRAM total on the machine). min_ram_gb=512,
  // gpu_count=4 means "one instance with at least 512 GB total system
  // RAM across all 4 GPUs."
  //
  // Provider adapters convert at the wire boundary -- RunPod's
  // minRAMPerGPU field is per-GPU, so the adapter divides our total
  // min_ram_gb by gpu_count before sending the request.

  // Minimum VRAM in GB, per GPU. Required (or set via class shorthand).
  int32 min_vram_gb = 1;
  // Minimum container disk in GB, per instance. 0 = use provider default.
  int32 min_disk_gb = 2;
  // Minimum system RAM in GB, per instance. 0 = use provider default.
  int32 min_ram_gb = 3;
  // GPU count on the instance. 0 means 1.
  int32 gpu_count = 4;

  // Class shorthand. Expanded server-side into constraint defaults.
  string class = 5;

  // Exact-SKU escape hatch. When set, skips constraint resolution and
  // is passed verbatim to the provider. Mutually exclusive with class
  // (and constraints are ignored -- the SKU is the answer).
  string sku = 6;
}

// GpuInfo describes what was actually scheduled. Provider answers with
// a concrete SKU and observed VRAM after the spawn.
message GpuInfo {
  string class = 1;
  string sku = 2;
  int32 count = 3;
  int32 vram_gb = 4;
}

// SshTarget is the reachability tuple returned for instances that expose
// SSH (every provider in v0.1 except local). Phase 2's deploy primitive
// uses it to docker-run the engine container.
message SshTarget {
  string host = 1;
  int32 port = 2;
  string user = 3;
}

// InstanceState is the lifecycle phase of a provisioned instance, as
// iplane sees it. Five values, not three -- the two *ing states
// (PENDING, TERMINATING) exist so partial-failure recovery can
// distinguish "asked but do not know" from "tried and failed" without
// over-charging or leaking.
enum InstanceState {
  INSTANCE_STATE_UNSPECIFIED = 0;
  // Record written locally, Spawn call has not returned.
  INSTANCE_STATE_PENDING = 1;
  // Spawn returned success, instance reachable, billing started.
  INSTANCE_STATE_ACTIVE = 2;
  // Terminate requested, provider call has not returned.
  INSTANCE_STATE_TERMINATING = 3;
  // Provider confirms gone (or returned not-found).
  INSTANCE_STATE_TERMINATED = 4;
  // Provider returned an error; resolution requires operator action.
  INSTANCE_STATE_FAILED = 5;
}

// Instance is what the provider returned, plus iplane-side bookkeeping.
// The spec field is a snapshot of what was asked for so reconcile can
// detect drift and errata cherry-picks that change the class -> SKU
// table can still answer "what did class:large mean on the day this
// was created."
//
// Instances are immutable from iplane's perspective. Resize, change
// image, change region -- all destroy-and-recreate.
message Instance {
  // Mirror of spec.id. Iplane-side canonical identifier.
  string id = 1;

  // Provider's internal handle (RunPod pod id, AWS instance-id, a
  // process identifier for local). Filled by Spawn; empty while
  // state is PENDING or FAILED-pre-spawn.
  string provider_id = 2;

  // Which adapter owns this instance.
  string provider = 3;

  // Spec snapshot from the time of Spawn.
  Spec spec = 4;

  // Region as actually scheduled by the provider (may differ from
  // spec.region if the provider auto-selects a sub-zone).
  string region = 5;

  // GPU as actually scheduled (concrete SKU, observed VRAM).
  GpuInfo gpu = 6;

  // What the operator is being billed at the moment of Spawn. Loaded
  // from providers.yaml then confirmed against the provider's response
  // where available.
  double hourly_rate_usd = 7;

  InstanceState state = 8;

  // When the local record was first written (state=PENDING).
  google.protobuf.Timestamp created_at = 9;

  // When Spawn returned success and state moved to ACTIVE.
  google.protobuf.Timestamp activated_at = 10;

  // When state moved to TERMINATED.
  google.protobuf.Timestamp terminated_at = 11;

  // Empty until state==ACTIVE. Local instances leave this empty
  // permanently (no remote shell on the laptop).
  SshTarget ssh = 12;

  // The wrapped provider-error message when state is FAILED. Surfaced
  // to the operator on the next list.
  string failure_reason = 13;

  // Provider-specific extension data, opaque to iplane core. Raw JSON
  // bytes so a v0.1 reader can deserialize state written by a future
  // version without losing or rejecting unknown fields -- the
  // forward-compatibility property the state file owes any reader
  // pinned to ch06-final.
  bytes provider_data = 14;
}

// InstanceRef is the lighter-weight record returned by the underlying
// provider List operation. Carries the minimum needed to reconcile
// against local state. Callers that need the full Instance call
// Describe(provider_id).
message InstanceRef {
  string provider_id = 1;
  // The provider's literal status string. The provider package documents
  // the mapping to InstanceState; pushing the mapping into the adapter
  // keeps the wire vocabulary visible for debugging.
  string provider_state = 2;
  // Includes iplane-id and iplane-operator if iplane created the
  // instance.
  map<string, string> tags = 3;
  double hourly_rate_usd = 4;
  google.protobuf.Timestamp created_at = 5;
}

// Deployment is an engine container running on a previously-provisioned
// Instance. Locked by docs/design/0002-deploy.md -- see that doc for
// the rationale behind: declarative-semantics under imperative verb
// name, async-with-LRO state machine, exact-match drift detection on
// (image, model), audit-only engine config in v0.1.
message Deployment {
  // Operator-supplied identifier. Required. Tenant-globally unique
  // across all providers (separate namespace from Instance ids -- a
  // Deployment id and an Instance id can be the same string, they are
  // looked up in different tables).
  string id = 1;

  // Foreign key into Instance.id. The Deployment's target instance.
  // Required: every Deployment must name an existing Instance.
  string instance_id = 2;

  // Desired-state axis. Drift detection in v0.1 is exact-match on
  // (image, model) only. Engine config below is pass-through, audit-
  // only -- changing it does NOT cause re-deployment.
  string image = 3;
  string model = 4;

  // Pass-through configuration. Recorded for audit (so operators can
  // see what flags this deploy ran with) but NOT used to detect drift
  // in v0.1. v0.2's --engine-config <yaml> promotes a typed engine
  // config blob into desired state.
  repeated string engine_args = 5;
  map<string, string> env = 6;
  int32 engine_port = 7;

  DeploymentState state = 8;
  // Set when state == FAILED. Wraps the provider / SSH / docker
  // error message preserving the original text.
  string failure_reason = 9;

  // LRO progress fields. Updated by the executor as deploy proceeds.
  // Operators read via DescribeDeployment / WatchDeployment.
  string current_phase = 10;        // e.g. "ssh:connecting", "docker:pulling"
  string progress_message = 11;     // e.g. "pulling layer 4/12"

  google.protobuf.Timestamp created_at = 12;     // when PENDING was written
  google.protobuf.Timestamp started_at = 13;     // when STARTING entered
  google.protobuf.Timestamp ready_at = 14;       // when RUNNING entered
  google.protobuf.Timestamp terminated_at = 15;  // when TERMINATED entered

  // Container handle on the remote box. Filled when state >= STARTING.
  // Used by describe / status to query the live container via
  // `docker inspect`.
  string container_id = 16;

  // Engine's OpenAI-compat endpoint URL. Filled when state == RUNNING.
  // Phase 3 (telemetry seeding) and Phase 5 (`iplane up` UX wrapper)
  // both surface this to operators.
  string engine_endpoint = 17;

  // Operator wants shell-level access to the running engine pod
  // ("shell into the box running my model"). Provider-neutral intent;
  // each adapter translates to its own mechanism:
  //   - RunPod: allocate publicIp + NAT-map sshd (costs more, restricts
  //     placement to publicIp-capable hosts).
  //   - Lambda Labs / raw VMs (v0.2): no-op -- sshd is baseline; this
  //     just controls whether `inst.ssh` is populated.
  //   - Modal (later): satisfied via the provider's logs/exec UI;
  //     adapter may reject the request if shell isn't available.
  //   - k8s (v1.0): translates to a port-forward / kubectl exec hint.
  // Default false: the engine port goes through the provider's
  // managed proxy (no publicIp on RunPod, in-cluster service URL on
  // k8s) -- cheapest capacity, no debug side-channel.
  bool debug_shell = 18;

  // idle_ttl_seconds is the inactivity window after which v0.2's idle
  // reaper destroys this deployment. Zero means "TTL not set by
  // operator"; the reaper applies the profile default at evaluation
  // time (demo profile is low single-digit minutes; dev and prod
  // profiles longer). Mutated only at CreateDeployment time in v0.2.
  // Reads land in the reaper ticket; this field is persistence-only
  // until then.
  int32 idle_ttl_seconds = 19;

  // last_activity_at is the timestamp of the most recent activity
  // against this deployment. Activity covers two sources:
  //   - the data plane: an inference request entering the router.
  //   - the control plane: an operator-facing RPC against this
  //     deployment (describe, watch, touch).
  // Nil means "never touched since creation"; the reaper treats nil
  // with a non-zero TTL the same as last_activity_at = created_at.
  // Written by the router and by DeploymentService RPC handlers;
  // read by the reaper. Touch (v0.2 ch7-beat1.8) is the operator-
  // facing reset.
  google.protobuf.Timestamp last_activity_at = 20;

  // no_idle_destroy pins the deployment: when true, the idle reaper
  // skips it entirely. Operator sets it at CreateDeployment time
  // (--no-idle-destroy flag in v0.2 ch7-beat1.9); flipping it later
  // requires the unpin verb (system-hygiene). Use case: the shared
  // deployment across Ch 7's demos is pinned at the start of the
  // session so afk pauses do not tear it down.
  bool no_idle_destroy = 21;

  // Field 22 was Deployment.default_priority (Priority enum) in an
  // earlier draft of v0.2 ch7-beat2.3. Removed before merge: priority
  // Slots 22 and 23 were briefly used in pre-merge drafts (a
  // Deployment.default_priority field and a homogeneous replicas
  // int) -- both removed before merge once we worked out that
  // priority is request-traffic-level, not artifact-level, and
  // that a homogeneous count duplicates k8s without surfacing
  // iplane's heterogeneous-fleet differentiator. Pre-publication,
  // `reserved` markers are not warranted (no deployed wire
  // consumers to protect from slot re-use); the slots are simply
  // free for re-use if needed.

  // instance_ids is the full list of Instances that back this
  // Deployment (v0.2 ch7-beat3.1). One Deployment, N Instances --
  // each Instance was provisioned independently and may differ in
  // provider / GPU class / region. Beat 3 fan-out (#84) writes
  // this list at CreateDeployment time (for the --replicas N sugar)
  // or via the add-instance verb (for heterogeneous composition).
  // Beat 3 router fan-out (#85) reads this list to pick which
  // engine endpoint a request goes to.
  //
  // Backward-compat with v0.1's single-instance contract: when
  // instance_ids is empty (legacy 1.2 records), readers treat the
  // singular `instance_id` field as the only entry. The
  // EffectiveInstanceIDs helper (added in #84) encapsulates this
  // fallback so callers don't branch on emptiness themselves.
  //
  // The singular `instance_id` field at slot 2 stays for v0.1
  // backward-compat: for one-instance deployments it remains the
  // canonical primary; for multi-instance deployments it equals
  // instance_ids[0] (the first-provisioned instance).
  repeated string instance_ids = 24;

  // engine_endpoints is the parallel list to instance_ids: position i
  // holds the engine endpoint URL for instance_ids[i], or empty
  // string while that instance hasn't reached RUNNING yet (v0.2
  // ch7-beat3.2 / #84-#85). Maintained by the Service as the single
  // writer; the router reads it to pick which endpoint a request
  // goes to via round-robin (and future per-replica policies).
  //
  // Invariant: when populated, len(engine_endpoints) ==
  // len(instance_ids). Empty list (Beat 1+2 single-instance
  // Deployments) means "fall back to the singular engine_endpoint
  // field at slot 17." The EffectiveEndpoints helper encapsulates
  // this fallback.
  //
  // Why denormalized on Deployment rather than fetched per-request
  // from each Instance: the Service is the single writer of
  // deployment state and naturally knows both the instance set and
  // each engine's endpoint at deploy time. Snapshot-on-Deployment
  // means the router does 1 RPC per request (DescribeDeployment)
  // instead of 1 + N. Consistency is the Service's problem -- a
  // future cache invalidator (#88+) layers on top without
  // restructuring this field.
  repeated string engine_endpoints = 25;

  // unhealthy_instance_ids is the parallel set of Instance IDs that
  // the health-poll loop has currently marked unhealthy. Position-
  // independent: the router treats membership in this set as the
  // signal to skip the corresponding entry in instance_ids /
  // engine_endpoints. v0.2 ch7-beat3.5 (#87).
  //
  // Why a parallel set, not a state flag on each instance: the
  // router already does an effective_endpoints lookup per request;
  // adding a small set membership check is O(k) where k = number
  // of replicas (small). A per-instance state enum would have
  // required a proto restructure to `repeated Replica` and would
  // have invalidated the parallel-arrays shape #84/#85 just
  // landed on.
  //
  // Mutation contract: only the health-poll loop writes this field.
  // It calls Quarantine(deploy, instance) on the deployment service
  // after K consecutive /health failures, and Restore(deploy,
  // instance) after K consecutive successes when previously
  // quarantined. The engine endpoint in engine_endpoints[i] is
  // preserved across quarantine; restore is set-removal, not
  // re-discovery.
  //
  // Persistence: this field is persisted to the state file so
  // operator-visible quarantine state survives daemon restart. The
  // K-of-K streak counters are in-memory only; a restart resets
  // them, which means a quarantined replica may take an extra K
  // ticks to restore after the daemon comes back -- acceptable
  // since restart is rare.
  repeated string unhealthy_instance_ids = 26;

  // replica_specs records the per-slot ReplicaSpec each slot was
  // originally provisioned from (heterogeneous form) or derived
  // from (homogeneous form: one entry replicated len(instance_ids)
  // times via resolveCreateReplicaSpecs). Parallel to instance_ids
  // / engine_endpoints / unhealthy_instance_ids; position i is the
  // spec for instance_ids[i]. v0.2 ch7-beat3.9 (#143).
  //
  // This is the operator's *intent* shape: class="small" stays
  // "small" here even after the provider resolved it to a concrete
  // SKU at rent time (the resolved form lives on Instance.spec.
  // requirements -- two complementary views).
  //
  // Used by:
  //   - #93's reconciliation loop: retry a failed slot with the
  //     same spec the operator asked for, even if the dead
  //     Instance is gone from the state file.
  //   - Scale operations: anchor off dep.replica_specs[0] instead
  //     of looking up the slot-0 Instance for the homogeneous
  //     target_replicas form.
  //   - Describe / audit: surface what the operator actually
  //     asked for, not just what got rented.
  //
  // Empty list for Beat 1+2 single-instance legacy deployments
  // (which fell back to the singular instance_id). Beat 3
  // deployments always populate this in lockstep with the other
  // parallel arrays.
  repeated ReplicaSpec replica_specs = 27;
}

// ReplicaSpec carries one replica's per-slot provisioning shape.
// Used in `replicas_spec` on CreateDeploymentRequest, `add_replicas`
// on ScaleDeploymentRequest, AND on Deployment.replica_specs (the
// persisted operator-intent form per slot). Each spec is validated
// and placed independently; a heterogeneous fan-out is N parallel
// placements of N different specs.
//
// Lives in types.proto (not service.proto) because Deployment
// references it -- types.proto can't import service.proto, so the
// shared message belongs here.
message ReplicaSpec {
  // Provider to provision this replica on. Required.
  string provider = 1;
  // Region hint passed to the provider when supported. Optional.
  string region = 2;
  // Resource requirements for this replica's underlying Instance.
  // Same three-layer shape as the homogeneous `requirements` field:
  // class shorthand, numeric floors, or exact sku. Required.
  ResourceRequirements requirements = 3;
}

// Priority is the lane an inbound request joins on its way to the
// engine. Two values in v0.2: interactive (low-latency, user-facing)
// and batch (high-throughput, bulk). The scheduler that decides
// which lane to drain when lands in v0.2 ch7-beat2.4; this enum
// just labels the request so the lane structure can be plumbed.
//
// Priority is a request-level concept -- the router maps inbound
// requests onto lanes based on the X-IPlane-Priority header (or a
// router-level default for unannotated traffic). No Deployment-side
// proto field carries a priority; the engine itself is
// priority-blind.
//
// Forward-compat: numeric values are stable; appending future
// priorities (e.g., BACKGROUND, REALTIME) does not break readers
// pinned to ch07-final.
enum Priority {
  PRIORITY_UNSPECIFIED = 0;
  // User-facing traffic; should not wait behind bulk work.
  PRIORITY_INTERACTIVE = 1;
  // Bulk traffic; tolerates higher tail latency in exchange for
  // throughput.
  PRIORITY_BATCH = 2;
}

enum DeploymentState {
  DEPLOYMENT_STATE_UNSPECIFIED = 0;
  // Record written; executor has not started.
  DEPLOYMENT_STATE_PENDING = 1;
  // SSH + docker pull + docker run in progress.
  DEPLOYMENT_STATE_STARTING = 2;
  // Container started; engine loading model.
  DEPLOYMENT_STATE_CONFIGURING = 3;
  // Engine healthy; serving inference.
  DEPLOYMENT_STATE_RUNNING = 4;
  // Container alive but engine unhealthy.
  DEPLOYMENT_STATE_DEGRADED = 5;
  // Destroy in progress.
  DEPLOYMENT_STATE_TERMINATING = 6;
  // Terminal success.
  DEPLOYMENT_STATE_TERMINATED = 7;
  // Terminal failure (deploy or runtime).
  DEPLOYMENT_STATE_FAILED = 8;
}
