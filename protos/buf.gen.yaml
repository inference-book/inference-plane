version: v2

# Wipe the output directory each run so removed RPCs/messages don't
# leave stale generated files behind.
clean: true

# Managed mode lets buf rewrite proto file options at generation time.
# We override go_package_prefix so every proto's go_package implicitly
# resolves to github.com/inference-book/inference-plane/gen/go/...
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/inference-book/inference-plane/gen/go

# Plugins generate into ../gen/go (one directory up from this file,
# i.e. the inference_plane repo root).
plugins:
  # Standard protobuf Go types. paths=source_relative keeps the output
  # tree shaped like the proto tree.
  - remote: buf.build/protocolbuffers/go
    out: ../gen/go
    opt: paths=source_relative
    # Emit Go bindings for transitively-imported protos (google/api/*)
    # so our generated code imports from a path inside this module
    # rather than depending on an external grpc-gateway-genproto module.
    include_imports: true

  # Connect-RPC handlers. Generates handler interfaces that serve
  # gRPC + Connect + HTTP/JSON on a single Go handler -- clients pick
  # whichever transport they want.
  - remote: buf.build/connectrpc/go
    out: ../gen/go
    opt: paths=source_relative

  # Standard gRPC handlers. require_unimplemented_servers=false so we
  # don't have to embed Unimplemented* for forward compatibility --
  # the connect-rpc handler is our primary surface.
  - remote: buf.build/grpc/go
    out: ../gen/go
    opt: paths=source_relative,require_unimplemented_servers=false

  # gRPC-gateway plugin is intentionally disabled for v0.1.
  # OpenAI-compatible HTTP routes (/v1/completions, /v1/chat/completions,
  # /health) are hand-written in internal/web/openai/ because OpenAI's
  # JSON error envelope is hard to coax out of gateway's default
  # mappings. Re-enable when there's a consumer for proto-shaped REST.
  #
  # The google.api.http annotations remain in the protos as
  # documentation; they describe the URL mapping the hand-written
  # handlers implement.
  #
  # - remote: buf.build/grpc-ecosystem/gateway
  #   out: ../gen/go
  #   opt: paths=source_relative
